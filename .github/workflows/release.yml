name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.bump }}

      - name: Push version commit + tag
        run: git push origin main --follow-tags

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" --generate-notes *.tgz
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_OUTPUT"

      - name: Announce on Discord
        if: success() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ steps.release.outputs.tag }}
          URL: ${{ steps.release.outputs.url }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          REPO_NAME="${REPO##*/}"
          BODY=$(cat <<EOF
          {
            "embeds": [{
              "title": "\ud83d\udce6 ${REPO_NAME} ${TAG} released",
              "url": "${URL}",
              "color": 5763719,
              "fields": [
                {"name": "Version", "value": "${VERSION}", "inline": true},
                {"name": "Install", "value": "\`npm i @jiggai/${REPO_NAME}@${VERSION}\`", "inline": true},
                {"name": "Release Notes", "value": "[View on GitHub](${URL})", "inline": false}
              ]
            }]
          }
          EOF
          )
          curl -sf -H "Content-Type: application/json" -d "$BODY" "$WEBHOOK"
