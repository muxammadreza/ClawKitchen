name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.bump }}

      - name: Push version commit + tag
        run: git push origin main --follow-tags

      - name: Pack tarball
        run: npm pack

      - name: Get tarball name
        id: tarball
        run: echo "name=$(ls *.tgz)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.tarball.outputs.name }}
          path: "*.tgz"
          retention-days: 90

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" --generate-notes *.tgz
          NOTES=$(gh release view "$TAG" --json body -q .body)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_OUTPUT"
          # Save notes to file to preserve newlines
          echo "$NOTES" > /tmp/release-notes.md

      - name: Announce on Discord
        if: success() && env.WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ steps.release.outputs.tag }}
          URL: ${{ steps.release.outputs.url }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          PKG_NAME=$(node -p "require('./package.json').name")

          # Strip PR links, clean up, and truncate for Discord (4096 char limit)
          CLEAN=$(sed 's| by @[^ ]* in https://github.com/[^ ]*||g; s| in https://github.com/[^ ]*||g' /tmp/release-notes.md)
          NOTES=$(echo "$CLEAN" | head -c 3700)
          NOTES=$(printf "%s\n\n[View full changelog](%s)" "$NOTES" "$URL")

          # Build JSON payload with jq to handle escaping properly
          jq -n \
            --arg title "📦 ${PKG_NAME} ${TAG}" \
            --arg url "$URL" \
            --arg desc "$NOTES" \
            --arg version "$VERSION" \
            --arg install "npm i ${PKG_NAME}@${VERSION}" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5763719,
                fields: [
                  {name: "Version", value: $version, inline: true},
                  {name: "Install", value: ("`" + $install + "`"), inline: true}
                ]
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK"
